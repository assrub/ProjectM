name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Unity Android APK
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: client/Library
          key: Library-${{ hashFiles('client/Assets/**', 'client/Packages/**') }}
          restore-keys: |
            Library-

      - name: Setup Unity + Android
        uses: game-ci/unity-setup@v1
        with:
          version: 2022.3.20f1
          modules: android

      - name: Unity Builder
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: client
          targetPlatform: Android
          buildMethod: BuildScript.BuildAndroid
          androidAppBundle: false
          androidKeystoreName: user.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MuOnline-Mobile-Android
          path: build/Android/**/*.apk
          if-no-files-found: error

      - name: Upload symbol files
        uses: actions/upload-artifact@v4
        with:
          name: MuOnline-Symbols
          path: build/Android/**/*.symbols.zip
          if-no-files-found: ignore

  build-server:
    name: Build Server Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          tags: muonline-server:latest
          outputs: type=docker,dest=/tmp/muonline-server.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload server image
        uses: actions/upload-artifact@v4
        with:
          name: MuOnline-Server-Docker
          path: /tmp/muonline-server.tar
          if-no-files-found: ignore
